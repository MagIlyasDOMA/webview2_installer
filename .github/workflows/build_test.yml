name: Build Windows wheels and sdist

on:
  # Запуск вручную из интерфейса GitHub
  workflow_dispatch:
    inputs:
      upload_artifacts:
        description: 'Загрузить артефакты'
        required: false
        default: true
        type: boolean

jobs:
  build-wheels:
    name: Build for ${{ matrix.target }}
    runs-on: windows-latest
    strategy:
      fail-fast: false  # Не останавливать остальные сборки при ошибке одной
      matrix:
        include:
          # x86_64 (64-bit) - обычная сборка
          - target: x86_64-pc-windows-msvc
            arch: win_amd64
            rust-target: x86_64-pc-windows-msvc
            use-xwin: false

          # ARM64 - через cargo xwin
          - target: aarch64-pc-windows-msvc
            arch: win_arm64
            rust-target: aarch64-pc-windows-msvc
            use-xwin: true
            xwin-arch: arm64  # Для ARM64 не нужен специальный флаг

          # i686 (32-bit) - через cargo xwin
          - target: i686-pc-windows-msvc
            arch: win32
            rust-target: i686-pc-windows-msvc
            use-xwin: true
            xwin-arch: x86   # Для 32-bit нужен явный x86

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install cargo-xwin (если нужно)
        if: matrix.use-xwin
        run: cargo install cargo-xwin

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel for ${{ matrix.target }}
        shell: bash
        run: |
          if [[ "${{ matrix.use-xwin }}" == "true" ]]; then
            # Сборка через cargo xwin
            if [[ "${{ matrix.target }}" == "i686-pc-windows-msvc" ]]; then
              cargo xwin build --release --target ${{ matrix.target }} --xwin-arch=${{ matrix.xwin-arch }}
            else
              cargo xwin build --release --target ${{ matrix.target }}
            fi
          
            # Упаковка в wheel
            maturin build \
              --target ${{ matrix.target }} \
              --no-sdist \
              --skip-auditwheel \
              --find-interpreter \
              --out dist
          else
            # Обычная сборка через maturin
            maturin build \
              --release \
              --target ${{ matrix.target }} \
              --no-sdist \
              --find-interpreter \
              --out dist
          fi

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.arch }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 30  # Хранить 30 дней

  build-sdist:
    name: Build sdist (source distribution)
    runs-on: ubuntu-latest  # sdist собираем на Linux (быстрее и проще)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        run: |
          maturin sdist --allow-dirty
          mkdir -p dist
          cp target/wheels/*.tar.gz dist/

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 30

  # Сборка всех артефактов в один пакет (опционально)
  combine-artifacts:
    name: Combine all artifacts
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: always()  # Всегда запускать, даже если некоторые сборки упали

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "## 📦 Built artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for file in all-artifacts/*; do
            if [ -f "$file" ]; then
              size=$(du -h "$file" | cut -f1)
              filename=$(basename "$file")
              echo "| \`$filename\` | $size |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-packages
          path: all-artifacts/*
          retention-days: 30

  # Создание комментария с ссылками (для pull requests)
  comment-pr:
    name: Comment on PR with download links
    needs: combine-artifacts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Find Comment
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## 📦 Build artifacts'

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## 📦 Build artifacts
            
            Сборка завершена! Вы можете скачать артефакты:
            
            - [Скачать все пакеты](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            ### Доступные пакеты:
            - `webview2_installer-*.tar.gz` — исходный код (sdist)
            - `webview2_installer-*-win_amd64.whl` — Windows 64-bit
            - `webview2_installer-*-win32.whl` — Windows 32-bit
            - `webview2_installer-*-win_arm64.whl` — Windows ARM64
            
            🔗 **Как скачать:** Перейдите вниз страницы → раздел "Artifacts" → выберите нужный архив.
            
            > Артефакты хранятся 30 дней.
