[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "webview2-installer"
version = "0.1.0"
description = "WebView2 installer for Windows"
requires-python = ">=3.8"
dependencies = [
    "requests>=2",
    "tqdm>=4",
]

[tool.setuptools]
py-modules = ['webview2_installer']
